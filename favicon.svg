<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="5" fill="#0e0c09"/>
  <!-- Outer diamond -->
  <polygon points="16,2 30,16 16,30 2,16"
           fill="none" stroke="#c9a84c" stroke-width="1.4"/>
  <!-- Inner diamond (double frame = premium) -->
  <polygon points="16,5.5 26.5,16 16,26.5 5.5,16"
           fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>
  <!-- Serif B, centered -->
  <text x="16" y="20.5"
        font-family="Georgia,serif"
        font-size="13"
        font-weight="700"
        fill="#c9a84c"
        text-anchor="middle"
        letter-spacing="0">B</text>
</svg>
