<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Bottarga Brothers — Admin</title>
<style>
:root{--dark:#0a0a0a;--card:#141414;--border:#2a2a2a;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.15);--text:#e8e0d0;--muted:#888;--green:#4ade80;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-box h1{font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:.4rem;}
.login-box p{color:var(--muted);font-size:.875rem;margin-bottom:2rem;}
.login-box input{width:100%;background:#0f0f0f;border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:1rem;margin-bottom:1rem;outline:none;}
.login-box input:focus{border-color:var(--gold);}
.btn-gold{background:var(--gold);color:#0a0a0a;font-weight:700;border:none;padding:13px 28px;border-radius:8px;font-size:.95rem;cursor:pointer;width:100%;transition:opacity .2s;}
.btn-gold:hover{opacity:.85;}
.login-error{color:var(--red);font-size:.85rem;margin-top:.75rem;display:none;}
/* ADMIN PANEL */
#admin-panel{display:none;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar-logo{color:var(--gold);font-weight:700;font-size:1.1rem;}
.top-bar-actions{display:flex;gap:.75rem;align-items:center;}
.btn-save{background:var(--gold);color:#0a0a0a;font-weight:700;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.5;cursor:default;}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:.875rem;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.save-status{font-size:.85rem;color:var(--green);display:none;}
/* CONTENT */
.admin-content{padding:2rem;max-width:960px;margin:0 auto;}
.section-heading{font-size:1.1rem;font-weight:700;color:var(--gold);margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.section-heading:first-child{margin-top:0;}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:640px){.product-grid{grid-template-columns:1fr;}}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.product-card h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:1rem;}
.field{margin-bottom:.75rem;}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.35rem;}
.field input,.field textarea{width:100%;background:#0f0f0f;border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:7px;font-size:.875rem;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{resize:vertical;min-height:80px;font-family:inherit;}
.img-preview{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-top:.5rem;background:#1a1a1a;}
.img-preview[src=""]{display:none;}
.tabs{display:flex;gap:4px;margin-bottom:2rem;background:#0f0f0f;padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.875rem;font-weight:500;transition:all .2s;}
.tab.active{background:var(--card);color:var(--text);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.change-pwd-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;max-width:400px;}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
<div class="login-box">
<h1>Bottarga Brothers</h1>
<p>Admin Panel — enter your password to continue</p>
<input autocomplete="current-password" id="pwd-input" placeholder="Password" type="password"/>
<button class="btn-gold" onclick="doLogin()">Sign In</button>
<div class="login-error" id="login-error">Incorrect password. Please try again.</div>
</div>
</div>
<!-- ADMIN PANEL -->
<div id="admin-panel">
<div class="top-bar">
<div class="top-bar-logo">⚙ Admin Panel</div>
<div class="top-bar-actions">
<span class="save-status" id="save-status">✓ Saved</span>
<button class="btn-save" id="save-btn" onclick="saveAll()">Save All Changes</button>
<button class="btn-logout" onclick="doLogout()">Log out</button>
</div>
</div>
<div class="admin-content">
<div class="tabs">
<button class="tab active" onclick="switchTab('products',this)">Products</button>
<button class="tab" onclick="switchTab('pages',this)">Page Text</button>
<button class="tab" onclick="switchTab('settings',this)">Settings</button>
</div>
<!-- PRODUCTS TAB -->
<div class="tab-content active" id="tab-products">
<div class="section-heading">USA Shop — Products</div>
<div class="product-grid" id="product-grid"></div>
</div>
<!-- PAGE TEXT TAB -->
<div class="tab-content" id="tab-pages">
<div class="section-heading">Homepage</div>
<div class="field"><label>Hero Headline</label><input data-key="hero_headline" placeholder="The World's Finest Bottarga" type="text"/></div>
<div class="field"><label>Hero Subheadline</label><input data-key="hero_sub" placeholder="Wild-caught mullet roe..." type="text"/></div>
<div class="section-heading">About Page</div>
<div class="field"><label>About Intro Paragraph</label><textarea data-key="about_intro" placeholder="Our story..."></textarea></div>
<div class="section-heading">Contact Info</div>
<div class="field"><label>Email Address</label><input data-key="contact_email" placeholder="contact@bottargabrothers.com" type="text"/></div>
<div class="field"><label>Phone / WhatsApp</label><input data-key="contact_phone" placeholder="+1 (203) ..." type="text"/></div>
</div>
<!-- SETTINGS TAB -->
<div class="tab-content" id="tab-settings">
<div class="section-heading">Change Password</div>
<div class="change-pwd-section">
<div class="field"><label>New Password</label><input id="new-pwd" placeholder="At least 8 characters" type="password"/></div>
<div class="field"><label>Confirm Password</label><input id="confirm-pwd" placeholder="Repeat password" type="password"/></div>
<button class="btn-gold" onclick="changePassword()" style="width:auto;padding:10px 24px;">Update Password</button>
<div id="pwd-change-msg" style="margin-top:.75rem;font-size:.85rem;display:none;"></div>
</div>
</div>
</div>
</div>
<script>
const WORKER = 'https://bottarga-admin.zoozoomfast.workers.dev';
let SESSION_PWD = '';

const PRODUCTS = [
  { id: 'sardinian-gold',       label: 'Sardinian Gold',          selector: '#sardinia',  img_src: 'img/sardinian_40off.jpg' },
  { id: 'boutargue-classique',  label: 'Boutargue Classique',     selector: '#france',    img_src: 'img/bout_class_square.jpg' },
  { id: 'boutargue-imperiale',  label: 'Boutargue Impériale',     selector: '#imperiale', img_src: 'img/imperiale_square.jpg' },
  { id: 'greek-avgotaraho',     label: 'Greek Avgotaraho',        selector: '#greece',    img_src: 'img/greek_avgotaraho.jpg' },
];

// ── LOGIN ────────────────────────────────────────────────────────────
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  // Test password by trying to fetch content (GET is always allowed, so test with a lightweight POST)
  try {
    const res = await fetch(WORKER + '/content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pwd },
      body: JSON.stringify({ _test: true }),
    });
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    SESSION_PWD = pwd;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    await loadContent();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Connection error. Please try again.';
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  SESSION_PWD = '';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

// ── TABS ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── BUILD PRODUCT GRID ───────────────────────────────────────────────
function buildProductGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = PRODUCTS.map(p => `
    <div class="product-card">
      <h3>${p.label}</h3>
      <div class="field">
        <label>Product Name</label>
        <input type="text" data-key="product_${p.id}_name" placeholder="${p.label}"/>
      </div>
      <div class="field">
        <label>Short Description</label>
        <textarea data-key="product_${p.id}_desc" placeholder="Enter description..."></textarea>
      </div>
      <div class="field">
        <label>Starting Price (display only, e.g. $38.99)</label>
        <input type="text" data-key="product_${p.id}_price" placeholder="$38.99"/>
      </div>
      <div class="field">
        <label>Product Image URL</label>
        <input type="text" data-key="product_${p.id}_img" placeholder="${p.img_src}"
          oninput="updatePreview(this, 'prev_${p.id}')"/>
        <img id="prev_${p.id}" class="img-preview" src="" alt="preview"/>
      </div>
    </div>
  `).join('');
}

function updatePreview(input, previewId) {
  const img = document.getElementById(previewId);
  if (img) {
    img.src = input.value || '';
    img.style.display = input.value ? 'block' : 'none';
  }
}

// ── LOAD SAVED CONTENT ───────────────────────────────────────────────
async function loadContent() {
  buildProductGrid();
  try {
    const res = await fetch(WORKER + '/content');
    const data = await res.json();
    if (!data || Object.keys(data).length === 0) return;
    // Populate all inputs
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.dataset.key;
      if (data[key] !== undefined) {
        el.value = data[key];
        // Trigger image preview
        if (key.endsWith('_img') && data[key]) {
          const pid = key.replace('product_','').replace('_img','');
          const preview = document.getElementById('prev_' + pid);
          if (preview) { preview.src = data[key]; preview.style.display = 'block'; }
        }
      }
    });
  } catch(e) {
    console.warn('Could not load content:', e);
  }
}

// ── SAVE ─────────────────────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  const data = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    if (el.value.trim()) data[el.dataset.key] = el.value.trim();
  });
  try {
    const res = await fetch(WORKER + '/content', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SESSION_PWD },
      body: JSON.stringify(data),
    });
    if (res.ok) {
      const status = document.getElementById('save-status');
      status.style.display = 'inline';
      setTimeout(() => status.style.display = 'none', 3000);
    } else {
      alert('Save failed. Please log out and try again.');
    }
  } catch(e) {
    alert('Connection error during save.');
  }
  btn.disabled = false;
  btn.textContent = 'Save All Changes';
}

// ── CHANGE PASSWORD ───────────────────────────────────────────────────
async function changePassword() {
  const newPwd = document.getElementById('new-pwd').value;
  const confirm = document.getElementById('confirm-pwd').value;
  const msg = document.getElementById('pwd-change-msg');
  msg.style.display = 'none';
  if (newPwd.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.style.color='var(--red)'; msg.style.display='block'; return; }
  if (newPwd !== confirm) { msg.textContent = 'Passwords do not match.'; msg.style.color='var(--red)'; msg.style.display='block'; return; }
  try {
    const res = await fetch(WORKER + '/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': SESSION_PWD },
      body: JSON.stringify({ new_password: newPwd }),
    });
    if (res.ok) {
      SESSION_PWD = newPwd;
      msg.textContent = '✓ Password updated successfully.';
      msg.style.color = 'var(--green)';
      msg.style.display = 'block';
      document.getElementById('new-pwd').value = '';
      document.getElementById('confirm-pwd').value = '';
    } else {
      msg.textContent = 'Failed to update password.';
      msg.style.color = 'var(--red)';
      msg.style.display = 'block';
    }
  } catch(e) {
    msg.textContent = 'Connection error.';
    msg.style.color = 'var(--red)';
    msg.style.display = 'block';
  }
}
</script>
</body>
</html>
