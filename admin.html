<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Bottarga Brothers — Admin</title>
<style>
:root{--dark:#0a0a0a;--card:#141414;--border:#2a2a2a;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.15);--text:#e8e0d0;--muted:#888;--green:#4ade80;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-box h1{font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:.4rem;}
.login-box p{color:var(--muted);font-size:.875rem;margin-bottom:2rem;}
.login-box input{width:100%;background:#0f0f0f;border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:1rem;margin-bottom:1rem;outline:none;}
.login-box input:focus{border-color:var(--gold);}
.btn-gold{background:var(--gold);color:#0a0a0a;font-weight:700;border:none;padding:13px 28px;border-radius:8px;font-size:.95rem;cursor:pointer;width:100%;transition:opacity .2s;}
.btn-gold:hover{opacity:.85;}
.login-error{color:var(--red);font-size:.85rem;margin-top:.75rem;display:none;}
/* password wrapper with eye icon */
.pwd-wrap{position:relative;margin-bottom:1rem;}
.login-box .pwd-wrap input{margin-bottom:0;}
.pwd-wrap input{padding-right:44px!important;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;line-height:0;opacity:.5;}
.eye-btn:hover{color:var(--text);opacity:1;}
.eye-btn svg{display:block;}
/* admin panel */
#admin-panel{display:none;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar-logo{color:var(--gold);font-weight:700;font-size:1.1rem;}
.top-bar-user{color:var(--muted);font-size:.8rem;}
.top-bar-actions{display:flex;gap:.75rem;align-items:center;}
.btn-save{background:var(--gold);color:#0a0a0a;font-weight:700;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.5;cursor:default;}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:.875rem;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.save-status{font-size:.85rem;color:var(--green);display:none;}
.admin-content{padding:2rem;max-width:960px;margin:0 auto;}
.section-heading{font-size:1.1rem;font-weight:700;color:var(--gold);margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.section-heading:first-child{margin-top:0;}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:640px){.product-grid{grid-template-columns:1fr;}}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.product-card h3{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:1rem;}
.field{margin-bottom:.75rem;}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.35rem;}
.field input,.field textarea,.field select{width:100%;background:#0f0f0f;border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:7px;font-size:.875rem;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);}
.field textarea{resize:vertical;min-height:80px;font-family:inherit;}
.field select option{background:#1a1a1a;}
.field .pwd-wrap{margin-bottom:0;}
.img-preview{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-top:.5rem;background:#1a1a1a;}
.img-preview[src=""]{display:none;}
.tabs{display:flex;gap:4px;margin-bottom:2rem;background:#0f0f0f;padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.875rem;font-weight:500;transition:all .2s;}
.tab.active{background:var(--card);color:var(--text);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.settings-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;max-width:420px;margin-bottom:1.5rem;}
.confirm-block{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:.5rem;}
.confirm-block label{color:var(--gold)!important;}
.confirm-block input{border:none;background:transparent;padding:8px 0 0;}
.btn-secondary{background:transparent;border:1px solid var(--gold);color:var(--gold);font-weight:600;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.875rem;transition:all .2s;}
.btn-secondary:hover{background:var(--gold-dim);}
.msg{margin-top:.75rem;font-size:.85rem;display:none;}
.role-badge{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:var(--gold-dim);color:var(--gold);margin-left:.5rem;vertical-align:middle;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Bottarga Brothers</h1>
    <p>Admin Panel — sign in to continue</p>
    <input id="user-input" placeholder="Username" type="text" autocomplete="username"/>
    <div class="pwd-wrap">
      <input id="pwd-input" placeholder="Password" type="password" autocomplete="current-password"/>
      <button class="eye-btn" type="button" onclick="toggleEye('pwd-input',this)" title="Show/hide password"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <button class="btn-gold" onclick="doLogin()" style="margin-top:.25rem;">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="top-bar">
    <div class="top-bar-logo">⚙ Admin Panel</div>
    <div class="top-bar-actions">
      <span class="top-bar-user" id="top-user"></span>
      <span class="save-status" id="save-status">✓ Saved</span>
      <button class="btn-save" id="save-btn" onclick="saveAll()">Save All Changes</button>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="tabs" id="main-tabs">
      <button class="tab active" onclick="switchTab('products',this)">Products</button>
      <button class="tab" onclick="switchTab('pages',this)">Page Text</button>
      <button class="tab" onclick="switchTab('settings',this)">Settings</button>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-content active" id="tab-products">
      <div class="section-heading">USA Shop — Products</div>
      <div class="product-grid" id="product-grid"></div>
    </div>

    <!-- PAGE TEXT TAB -->
    <div class="tab-content" id="tab-pages">
      <div class="section-heading">Homepage</div>
      <div class="field"><label>Hero Headline</label><input data-key="hero_headline" placeholder="The World's Finest Bottarga" type="text"/></div>
      <div class="field"><label>Hero Subheadline</label><input data-key="hero_sub" placeholder="Wild-caught mullet roe..." type="text"/></div>
      <div class="section-heading">About Page</div>
      <div class="field"><label>About Intro Paragraph</label><textarea data-key="about_intro" placeholder="Our story..."></textarea></div>
      <div class="section-heading">Contact Info</div>
      <div class="field"><label>Email Address</label><input data-key="contact_email" placeholder="contact@bottargabrothers.com" type="text"/></div>
      <div class="field"><label>Phone / WhatsApp</label><input data-key="contact_phone" placeholder="+1 (203) ..." type="text"/></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-content" id="tab-settings">

      <div class="section-heading">Change Password</div>
      <div class="settings-box">
        <div class="field">
          <label>New Password</label>
          <div class="pwd-wrap"><input id="new-pwd" placeholder="At least 8 characters" type="password"/><button class="eye-btn" type="button" onclick="toggleEye('new-pwd',this)"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <div class="pwd-wrap"><input id="confirm-pwd" placeholder="Repeat password" type="password"/><button class="eye-btn" type="button" onclick="toggleEye('confirm-pwd',this)"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
        </div>
        <button class="btn-secondary" onclick="changePassword()">Update Password</button>
        <div class="msg" id="pwd-change-msg"></div>
      </div>

      <!-- ADD USER — only shown to admins -->
      <div id="add-user-section" style="display:none;">
        <div class="section-heading">Add New User</div>
        <div class="settings-box">
          <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.25rem;">Create a new account. Admins can add more users; Users cannot.</p>
          <div class="field"><label>Username</label><input id="new-user-name" placeholder="e.g. marco" type="text" autocomplete="off"/></div>
          <div class="field">
            <label>Password</label>
            <div class="pwd-wrap"><input id="new-user-pwd" placeholder="At least 8 characters" type="password" autocomplete="new-password"/><button class="eye-btn" type="button" onclick="toggleEye('new-user-pwd',this)"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <div class="pwd-wrap"><input id="new-user-pwd2" placeholder="Repeat password" type="password" autocomplete="new-password"/><button class="eye-btn" type="button" onclick="toggleEye('new-user-pwd2',this)"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
          </div>
          <div class="field">
            <label>Role</label>
            <select id="new-user-role">
              <option value="user">User — can use the panel, cannot add others</option>
              <option value="admin">Admin — full access, can add more users</option>
            </select>
          </div>
          <div class="confirm-block">
            <div class="field" style="margin-bottom:0;">
              <label>Your Password (confirmation)</label>
              <div class="pwd-wrap"><input id="confirm-own-pwd" placeholder="Enter your password to confirm" type="password" autocomplete="current-password"/><button class="eye-btn" type="button" onclick="toggleEye('confirm-own-pwd',this)"<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
            </div>
          </div>
          <button class="btn-secondary" onclick="addUser()" style="margin-top:1rem;">Create Account</button>
          <div class="msg" id="add-user-msg"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const WORKER = 'https://bottarga-admin.zoozoomfast.workers.dev';

// ── Session UUID — persists in localStorage forever ──────────────────
function getSessionId() {
  let sid = localStorage.getItem('bb_session_id');
  if (!sid) {
    sid = typeof crypto.randomUUID === 'function'
      ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = crypto.getRandomValues(new Uint8Array(1))[0] % 16;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    localStorage.setItem('bb_session_id', sid);
  }
  return sid;
}
const SESSION_ID = getSessionId();
let SESSION_USER = '';
let SESSION_PWD  = '';
let SESSION_ROLE = '';

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-Admin-User': SESSION_USER,
    'X-Admin-Password': SESSION_PWD,
    'X-Session-ID': SESSION_ID,
  };
}

// ── Eye toggle ────────────────────────────────────────────────────────
const EYE_OPEN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const showing = inp.type === 'password';
  inp.type       = showing ? 'text' : 'password';
  btn.innerHTML  = showing ? EYE_OFF : EYE_OPEN;
  btn.style.opacity = showing ? '1' : '0.5';
}

const PRODUCTS = [
  { id: 'sardinian-gold',      label: 'Sardinian Gold',      img_src: 'img/sardinian_40off.jpg' },
  { id: 'boutargue-classique', label: 'Boutargue Classique', img_src: 'img/bout_class_square.jpg' },
  { id: 'boutargue-imperiale', label: 'Boutargue Imperiale', img_src: 'img/imperiale_square.jpg' },
  { id: 'greek-avgotaraho',    label: 'Greek Avgotaraho',    img_src: 'img/greek_avgotaraho.jpg' },
];

// ── LOGIN ─────────────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('user-input').value.trim();
  const pwd  = document.getElementById('pwd-input').value;
  const err  = document.getElementById('login-error');
  err.style.display = 'none';
  if (!user || !pwd) { err.textContent = 'Enter both username and password.'; err.style.display = 'block'; return; }
  try {
    const res = await fetch(WORKER + '/me', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-User': user, 'X-Admin-Password': pwd, 'X-Session-ID': SESSION_ID },
      body: '{}',
    });
    if (res.status === 429) { const d = await res.json(); err.textContent = d.error; err.style.display = 'block'; return; }
    if (!res.ok) { err.textContent = 'Incorrect username or password.'; err.style.display = 'block'; return; }
    const me = await res.json();
    SESSION_USER = user;
    SESSION_PWD  = pwd;
    SESSION_ROLE = me.role;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display  = 'block';
    const roleLabel = SESSION_ROLE === 'admin' ? 'Admin Access' : 'User';
    document.getElementById('top-user').innerHTML = `${SESSION_USER}<span class="role-badge">${roleLabel}</span>`;
    // Only admins see Add User section
    if (SESSION_ROLE === 'admin') document.getElementById('add-user-section').style.display = 'block';
    await loadContent();
  } catch(e) { err.textContent = 'Connection error. Please try again.'; err.style.display = 'block'; }
}

document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pwd-input').focus(); });
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  SESSION_USER = ''; SESSION_PWD = ''; SESSION_ROLE = '';
  document.getElementById('admin-panel').style.display  = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('add-user-section').style.display = 'none';
  document.getElementById('user-input').value = '';
  document.getElementById('pwd-input').value  = '';
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── PRODUCT GRID ──────────────────────────────────────────────────────
function buildProductGrid() {
  document.getElementById('product-grid').innerHTML = PRODUCTS.map(p => `
    <div class="product-card">
      <h3>${p.label}</h3>
      <div class="field"><label>Product Name</label><input type="text" data-key="product_${p.id}_name" placeholder="${p.label}"/></div>
      <div class="field"><label>Short Description</label><textarea data-key="product_${p.id}_desc" placeholder="Enter description..."></textarea></div>
      <div class="field"><label>Starting Price (e.g. $38.99)</label><input type="text" data-key="product_${p.id}_price" placeholder="$38.99"/></div>
      <div class="field">
        <label>Product Image URL</label>
        <input type="text" data-key="product_${p.id}_img" placeholder="${p.img_src}" oninput="updatePreview(this,'prev_${p.id}')"/>
        <img id="prev_${p.id}" class="img-preview" src="" alt="preview"/>
      </div>
    </div>`).join('');
}

function updatePreview(input, pid) {
  const img = document.getElementById(pid);
  if (img) { img.src = input.value || ''; img.style.display = input.value ? 'block' : 'none'; }
}

// ── LOAD CONTENT ──────────────────────────────────────────────────────
async function loadContent() {
  buildProductGrid();
  try {
    const data = await fetch(WORKER + '/content').then(r => r.json());
    if (!data || !Object.keys(data).length) return;
    document.querySelectorAll('[data-key]').forEach(el => {
      const v = data[el.dataset.key];
      if (v !== undefined) {
        el.value = v;
        if (el.dataset.key.endsWith('_img') && v) {
          const pid  = el.dataset.key.replace('product_','').replace('_img','');
          const prev = document.getElementById('prev_' + pid);
          if (prev) { prev.src = v; prev.style.display = 'block'; }
        }
      }
    });
  } catch(e) { console.warn('Could not load content:', e); }
}

// ── SAVE ──────────────────────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const data = {};
  document.querySelectorAll('[data-key]').forEach(el => { if (el.value.trim()) data[el.dataset.key] = el.value.trim(); });
  try {
    const res = await fetch(WORKER + '/content', { method: 'POST', headers: authHeaders(), body: JSON.stringify(data) });
    if (res.ok) { const s = document.getElementById('save-status'); s.style.display = 'inline'; setTimeout(() => s.style.display = 'none', 3000); }
    else if (res.status === 401) alert('Session expired. Please log out and sign in again.');
    else alert('Save failed. Please try again.');
  } catch(e) { alert('Connection error during save.'); }
  btn.disabled = false; btn.textContent = 'Save All Changes';
}

// ── CHANGE PASSWORD ────────────────────────────────────────────────────
async function changePassword() {
  const newPwd  = document.getElementById('new-pwd').value;
  const confirm = document.getElementById('confirm-pwd').value;
  const msg     = document.getElementById('pwd-change-msg');
  msg.style.display = 'none';
  if (newPwd.length < 8) { showMsg(msg, 'Password must be at least 8 characters.', 'red'); return; }
  if (newPwd !== confirm) { showMsg(msg, 'Passwords do not match.', 'red'); return; }
  try {
    const res = await fetch(WORKER + '/change-password', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ new_password: newPwd }) });
    if (res.ok) {
      SESSION_PWD = newPwd;
      showMsg(msg, '✓ Password updated successfully.', 'green');
      document.getElementById('new-pwd').value     = '';
      document.getElementById('confirm-pwd').value = '';
    } else { const d = await res.json(); showMsg(msg, d.error || 'Failed to update.', 'red'); }
  } catch(e) { showMsg(msg, 'Connection error.', 'red'); }
}

// ── ADD USER ───────────────────────────────────────────────────────────
async function addUser() {
  const newUser = document.getElementById('new-user-name').value.trim();
  const newPwd  = document.getElementById('new-user-pwd').value;
  const newPwd2 = document.getElementById('new-user-pwd2').value;
  const role    = document.getElementById('new-user-role').value;
  const ownPwd  = document.getElementById('confirm-own-pwd').value;
  const msg     = document.getElementById('add-user-msg');
  msg.style.display = 'none';
  if (!newUser)             { showMsg(msg, 'Enter a username.', 'red'); return; }
  if (newUser.length < 3)   { showMsg(msg, 'Username must be at least 3 characters.', 'red'); return; }
  if (newPwd.length < 8)    { showMsg(msg, 'Password must be at least 8 characters.', 'red'); return; }
  if (newPwd !== newPwd2)   { showMsg(msg, 'Passwords do not match.', 'red'); return; }
  if (!ownPwd)              { showMsg(msg, 'Enter your current password to confirm.', 'red'); return; }
  if (ownPwd !== SESSION_PWD) { showMsg(msg, 'Your current password is incorrect.', 'red'); return; }
  try {
    const res = await fetch(WORKER + '/add-user', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ new_username: newUser, new_password: newPwd, role }) });
    const d = await res.json();
    if (res.ok) {
      showMsg(msg, `✓ ${d.message}`, 'green');
      document.getElementById('new-user-name').value   = '';
      document.getElementById('new-user-pwd').value    = '';
      document.getElementById('new-user-pwd2').value   = '';
      document.getElementById('confirm-own-pwd').value = '';
      document.getElementById('new-user-role').value   = 'user';
    } else { showMsg(msg, d.error || 'Failed to create user.', 'red'); }
  } catch(e) { showMsg(msg, 'Connection error.', 'red'); }
}

function showMsg(el, text, color) {
  el.textContent   = text;
  el.style.color   = color === 'green' ? 'var(--green)' : 'var(--red)';
  el.style.display = 'block';
}
